name: Tests & Build Check
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e .[dev]
      - run: python -m pytest tests/ -v
      - name: Smoke-test examples
        run: |
          python examples/01_fitness_beats_truth/fitness_beats_truth.py
          python examples/02_quantum_signature/quantum_signature.py
          python examples/05_self_ref_ablation/self_ref_ablation.py

  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install build twine
      - run: python -m build
      - run: python -m twine check dist/*
