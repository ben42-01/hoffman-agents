name: Tests & Pack Nodejs Check
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: node --test hoffman-agents-node/test/*.test.js
      - name: Smoke-test examples
        run: |
          node hoffman-agents-node/examples/01_fitness_beats_truth/fitness_beats_truth.js
          node hoffman-agents-node/examples/02_quantum_signature/quantum_signature.js
          node hoffman-agents-node/examples/05_self_ref_ablation/self_ref_ablation.js

  pack-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: cd hoffman-agents-node && npm pack --dry-run
