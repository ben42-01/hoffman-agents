name: Tests & Pack Check
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: node --test test/*.test.js
      - name: Smoke-test examples
        run: |
          node examples/01_fitness_beats_truth/fitness_beats_truth.js
          node examples/02_quantum_signature/quantum_signature.js
          node examples/05_self_ref_ablation/self_ref_ablation.js

  pack-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Check structure
        run: ls -la hoffman-agents-node/package.json
      - name: Pack check
        run: npm pack --dry-run
        working-directory: hoffman-agents-node
