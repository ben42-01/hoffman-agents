name: Tests & Pack Nodejs Check
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Run tests with report
        run: |
          set -o pipefail
          node --test --test-reporter=tap hoffman-agents-node/test/*.test.js | tee node-test-report.tap
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-test-report
          path: node-test-report.tap
      - name: Smoke-test examples
        run: |
          node hoffman-agents-node/examples/01_fitness_beats_truth/fitness_beats_truth.js
          node hoffman-agents-node/examples/02_quantum_signature/quantum_signature.js
          node hoffman-agents-node/examples/05_self_ref_ablation/self_ref_ablation.js

  pack-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hoffman-agents-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: pwd && ls -la && npm pack --dry-run
